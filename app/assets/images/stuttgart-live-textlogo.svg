<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" role="img" aria-labelledby="title desc">
  <title id="title">Stuttgart Live Textlogo</title>
  <desc id="desc">Reines schwarzes Textlogo mit STUTTGART in feiner Schrift und LIVE direkt dahinter in fett.</desc>
  <text x="24" y="86" fill="#000000" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="72">
    <tspan font-weight="300" letter-spacing="0.1em">STUTTGART</tspan><tspan font-weight="800" letter-spacing="0.02em">LIVE</tspan>
  </text>
</svg>
