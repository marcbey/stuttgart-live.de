<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" role="img" aria-labelledby="title desc">
  <title id="title">Stuttgart Live Logo</title>
  <desc id="desc">Rotes, dynamisches Wortmarken-Logo mit den Worten Stuttgart Live.</desc>
  <defs>
    <linearGradient id="slBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff485d"/>
      <stop offset="55%" stop-color="#e31b2e"/>
      <stop offset="100%" stop-color="#9f101d"/>
    </linearGradient>
    <linearGradient id="slGloss" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="slShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#6e0b14" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g transform="translate(12 14)" filter="url(#slShadow)">
    <path d="M18 8 L338 0 L318 132 L2 148 Z" fill="url(#slBg)"/>
    <path d="M26 23 L333 14 L327 43 L20 51 Z" fill="url(#slGloss)"/>
    <path d="M50 112 L308 99 L304 117 L46 130 Z" fill="#7e0d18" fill-opacity="0.78"/>
    <path d="M16 8 L338 0 L318 132" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M2 148 L318 132 L338 0" fill="none" stroke="#620912" stroke-opacity="0.36" stroke-width="2"/>

    <text x="46" y="66" transform="skewX(-14)" fill="#ffffff" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-size="44" font-style="italic" font-weight="700" letter-spacing="1.2">STUTTGART</text>
    <text x="112" y="114" transform="skewX(-10)" fill="#ffffff" font-family="Impact, Arial Black, sans-serif" font-size="62" font-weight="700" letter-spacing="4">LIVE</text>
    <path d="M82 76 L274 66" stroke="#ffffff" stroke-opacity="0.58" stroke-width="3"/>
  </g>
</svg>
