name: Codex Issue To PR

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  codex-fix:
    if: ${{ github.event.label.name == 'codex-fix' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libvips

      - name: Enable Corepack
        run: corepack enable

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: Render Codex prompt
        id: prompt
        env:
          ISSUE_TITLE_JSON: ${{ toJson(github.event.issue.title) }}
          ISSUE_BODY_JSON: ${{ toJson(github.event.issue.body || '') }}
        run: |
          set -euo pipefail

          tmp_dir=".github/codex/tmp/issue-${{ github.event.issue.number }}"
          mkdir -p "$tmp_dir"

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          tmp_dir = Path(".github/codex/tmp/issue-${{ github.event.issue.number }}")
          tmp_dir.mkdir(parents=True, exist_ok=True)
          issue_body = json.loads(os.environ["ISSUE_BODY_JSON"])
          (tmp_dir / "issue-body.txt").write_text(issue_body, encoding="utf-8")
          PY

          python3 script/github_collect_codex_images.py \
            --source-file "$tmp_dir/issue-body.txt" \
            --output-dir "$tmp_dir/images" \
            --metadata-file "$tmp_dir/image-metadata.json"

          python3 <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          template_path = Path(".github/codex/prompts/fix-issue.md")
          rendered_path = Path(".github/codex/prompts/fix-issue.rendered.md")
          metadata_path = Path(".github/codex/tmp/issue-${{ github.event.issue.number }}/image-metadata.json")

          def sanitize_text(value: str) -> str:
            value = value.replace("\r\n", "\n").replace("\r", "\n")
            return re.sub(r"[\x00-\x08\x0b\x0c\x0e-\x1f\x7f]", "", value)

          issue_title = sanitize_text(json.loads(os.environ["ISSUE_TITLE_JSON"])).replace("\n", " ").strip()
          issue_body = sanitize_text(json.loads(os.environ["ISSUE_BODY_JSON"])).strip()

          if not issue_body:
            issue_body = "_No issue body provided._"
          elif len(issue_body) > 12000:
            issue_body = f"{issue_body[:12000].rstrip()}\n\n[truncated]"

          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          image_notes = metadata["notes"]

          template = template_path.read_text(encoding="utf-8")
          replacements = {
              "{{ISSUE_TITLE}}": issue_title,
              "{{ISSUE_BODY}}": issue_body,
              "{{IMAGE_INPUTS}}": image_notes,
          }
          rendered = re.sub(
              r"\{\{ISSUE_TITLE\}\}|\{\{ISSUE_BODY\}\}|\{\{IMAGE_INPUTS\}\}",
              lambda match: replacements[match.group(0)],
              template,
          )

          rendered_path.write_text(rendered, encoding="utf-8")
          PY

          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          metadata = json.loads(Path(".github/codex/tmp/issue-${{ github.event.issue.number }}/image-metadata.json").read_text(encoding="utf-8"))
          args = ["--full-auto"]
          for image_path in metadata["image_paths"]:
            args.extend(["--image", image_path])

          print(f"codex_args_json={json.dumps(args)}")
          PY

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/fix-issue.rendered.md
          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: ${{ steps.prompt.outputs.codex_args_json }}

      - name: Verify repository
        run: |
          set -euo pipefail

          if [ -x ./bin/ci ]; then
            ./bin/ci
          elif [ -f ./package.json ]; then
            npm test
          elif [ -f ./Gemfile ]; then
            bundle exec rspec
          else
            echo "No supported verification command found. Expected an executable ./bin/ci, package.json, or Gemfile." >&2
            exit 1
          fi

      - name: Remove generated Codex artifacts
        run: |
          rm -f .github/codex/prompts/fix-issue.rendered.md
          rm -f codex-output.md
          rm -rf .github/codex/tmp/issue-${{ github.event.issue.number }}

      - name: Create pull request
        if: ${{ success() }}
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/issue-${{ github.event.issue.number }}
          base: ${{ github.event.repository.default_branch }}
          commit-message: "Fix issue: ${{ github.event.issue.title }}"
          title: "Fix issue: ${{ github.event.issue.title }}"
          body: |
            Fixes #${{ github.event.issue.number }}

            This automated fix PR was generated by Codex via GitHub Actions.
