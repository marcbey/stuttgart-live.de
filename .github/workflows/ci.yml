name: Main Checks

on:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libvips

      - name: Enable Corepack
        run: corepack enable

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: Lint (RuboCop)
        run: bin/rubocop

      - name: Security scan (Brakeman)
        run: bin/brakeman --no-pager

      - name: Dependency audit (Bundler Audit)
        run: bin/bundler-audit check --update

      - name: Run test suite
        run: bin/rails test
