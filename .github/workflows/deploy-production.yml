name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare Kamal secrets file
        run: cp .kamal/secrets.hetzner.example .kamal/secrets.hetzner

      - name: Prepare SSH access
        env:
          KAMAL_SSH_PRIVATE_KEY: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}
          KAMAL_WEB_HOST_OVERRIDE: ${{ vars.KAMAL_WEB_HOST }}
        run: |
          set -euo pipefail

          install -d -m 700 ~/.ssh
          printf '%s\n' "$KAMAL_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/kamal.key"
          chmod 600 "$RUNNER_TEMP/kamal.key"

          host="${KAMAL_WEB_HOST_OVERRIDE:-46.225.224.194}"
          ssh-keyscan -H "$host" >> ~/.ssh/known_hosts

      - name: Deploy with Kamal
        env:
          KAMAL_SSH_KEY_PATH: ${{ runner.temp }}/kamal.key
          KAMAL_WEB_HOST_OVERRIDE: ${{ vars.KAMAL_WEB_HOST }}
          APP_HOST_OVERRIDE: ${{ vars.APP_HOST }}
          KAMAL_REGISTRY_PASSWORD: ${{ github.token }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EASYTICKET_EVENTS_API: ${{ secrets.EASYTICKET_EVENTS_API }}
          EASYTICKET_EVENT_DETAIL_API: ${{ secrets.EASYTICKET_EVENT_DETAIL_API }}
          EASYTICKET_PARTNER_SHOP_ID: ${{ secrets.EASYTICKET_PARTNER_SHOP_ID }}
          EASYTICKET_TICKET_LINK_EVENT_BASE_URL: ${{ secrets.EASYTICKET_TICKET_LINK_EVENT_BASE_URL }}
          EVENTIM_FEED_URL: ${{ secrets.EVENTIM_FEED_URL }}
          EVENTIM_USER: ${{ secrets.EVENTIM_USER }}
          EVENTIM_PASS: ${{ secrets.EVENTIM_PASS }}
          RESERVIX_API_KEY: ${{ secrets.RESERVIX_API_KEY }}
          RESERVIX_EVENTS_API: ${{ secrets.RESERVIX_EVENTS_API }}
        run: |
          set -euo pipefail

          if [ -n "${KAMAL_WEB_HOST_OVERRIDE}" ]; then
            export KAMAL_WEB_HOST="${KAMAL_WEB_HOST_OVERRIDE}"
          fi

          if [ -n "${APP_HOST_OVERRIDE}" ]; then
            export APP_HOST="${APP_HOST_OVERRIDE}"
          fi

          bundle exec kamal deploy -d hetzner
