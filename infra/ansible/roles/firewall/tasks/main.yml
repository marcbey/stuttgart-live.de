---
- name: UFW installieren
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: UFW eingehenden Verkehr standardmäßig verbieten
  community.general.ufw:
    direction: incoming
    policy: deny

- name: UFW ausgehenden Verkehr standardmäßig erlauben
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Freigegebene TCP-Ports öffnen
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: CIDR-gebundene TCP-Regeln öffnen
  community.general.ufw:
    rule: allow
    src: "{{ item.from }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
  loop: "{{ firewall_tcp_cidr_rules | default([]) }}"

- name: UFW aktivieren
  community.general.ufw:
    state: enabled
